<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시나리오 피드백 관리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-sub: #64748b;
    --text-muted: #94a3b8;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);

    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --purple-mid: #8b5cf6;

    --green: #059669;
    --green-light: #d1fae5;
    --green-mid: #10b981;

    --blue: #2563eb;
    --blue-light: #dbeafe;
    --blue-mid: #3b82f6;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .login-box {
    background: var(--surface);
    border-radius: 20px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    text-align: center;
  }
  .login-box h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .login-box p {
    color: var(--text-sub);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 14px;
  }
  .login-box input:focus { border-color: #7c3aed; }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .login-box button:hover { opacity: .9; }
  .login-error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* ── APP ── */
  #app { display: none; }

  /* ── HEADER ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 20px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    flex-wrap: wrap;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    margin-right: 8px;
    white-space: nowrap;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-group label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
  }
  select.filter-select {
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    background: var(--surface);
    cursor: pointer;
    transition: border-color .2s;
  }
  select.filter-select:focus { border-color: #7c3aed; }

  .status-filters {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .status-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .status-btn.active {
    border-color: #7c3aed;
    background: #7c3aed;
    color: #fff;
  }
  .status-btn:hover:not(.active) { border-color: #7c3aed; color: #7c3aed; }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
  }
  .stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-sub);
  }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .stat-dot.pending { background: #f59e0b; }
  .stat-dot.ready   { background: #3b82f6; }
  .stat-dot.sent    { background: #10b981; }
  .stat-count { font-weight: 700; color: var(--text); }

  /* ── MAIN ── */
  .main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── SCHOOL GROUP ── */
  .school-group { margin-bottom: 36px; }
  .school-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .school-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }
  .school-count {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* school colors */
  .school-sungsim .school-badge { background: var(--purple); }
  .school-eungam .school-badge  { background: var(--green); }
  .school-eunpyeong .school-badge { background: var(--blue); }

  .school-sungsim .school-header { border-bottom-color: var(--purple-light); }
  .school-eungam .school-header  { border-bottom-color: var(--green-light); }
  .school-eunpyeong .school-header { border-bottom-color: var(--blue-light); }

  /* ── CLASS SECTION ── */
  .class-section { margin-bottom: 20px; }
  .class-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .card[data-status="sent"] { opacity: .75; }

  .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .school-sungsim .card-header { background: #faf5ff; }
  .school-eungam .card-header  { background: #f0fdf4; }
  .school-eunpyeong .card-header { background: #eff6ff; }

  .card-meta {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 13px;
    font-weight: 600;
  }
  .card-sep { color: var(--text-muted); font-weight: 300; }
  .group-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    color: #fff;
  }
  .school-sungsim .group-tag { background: var(--purple); }
  .school-eungam .group-tag  { background: var(--green); }
  .school-eunpyeong .group-tag { background: var(--blue); }

  /* status badge */
  .status-badge {
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-left: auto;
    white-space: nowrap;
  }
  .status-badge.pending { background: #fef3c7; color: #92400e; }
  .status-badge.ready   { background: #dbeafe; color: #1e40af; }
  .status-badge.sent    { background: #d1fae5; color: #065f46; }

  .card-body { padding: 14px 16px; }

  .sender-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .sender-name { font-weight: 600; font-size: 14px; }
  .sender-email {
    font-size: 12px;
    color: var(--text-sub);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 6px;
    word-break: break-all;
  }
  .format-tag {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--bg);
    border-radius: 6px;
    color: var(--text-sub);
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* scenario section */
  .scenario-section { margin-bottom: 12px; }
  .scenario-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    width: 100%;
    text-align: left;
  }
  .scenario-toggle:hover { color: var(--text); }
  .toggle-icon {
    width: 16px; height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    background: var(--bg);
    font-size: 10px;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .toggle-icon.open { transform: rotate(90deg); }
  .scenario-title-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .scenario-content {
    display: none;
    margin-top: 8px;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-sub);
    max-height: 260px;
    overflow-y: auto;
  }
  .scenario-content.open { display: block; }

  /* feedback */
  .feedback-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .feedback-label .auto-saved {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity .3s;
  }
  .feedback-label .auto-saved.visible { opacity: 1; }

  .feedback-textarea {
    width: 100%;
    min-height: 120px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    background: var(--surface);
  }
  .feedback-textarea:focus { border-color: #7c3aed; }

  /* action buttons */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    background: var(--surface);
    color: var(--text-sub);
  }
  .btn:hover { border-color: #7c3aed; color: #7c3aed; }
  .btn.btn-primary {
    background: #7c3aed;
    color: #fff;
    border-color: #7c3aed;
  }
  .btn.btn-primary:hover { background: #6d28d9; border-color: #6d28d9; }
  .btn.btn-success {
    background: #059669;
    color: #fff;
    border-color: #059669;
  }
  .btn.btn-success:hover { background: #047857; border-color: #047857; }
  .btn.btn-copy {
    background: #f1f5f9;
    color: var(--text-sub);
    border-color: var(--border);
    margin-left: auto;
  }
  .btn.btn-copy:hover { background: var(--bg); color: var(--text); }
  .btn.btn-copy.copied { color: #059669; border-color: #059669; }

  .btn[data-status="sent"] {
    background: #d1fae5;
    color: #065f46;
    border-color: #a7f3d0;
    cursor: default;
  }

  /* empty */
  .empty-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* logout */
  .logout-btn {
    margin-left: auto;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text-sub);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-inner { gap: 8px; }
    .header-title { font-size: 14px; }
    .status-filters { margin-left: 0; }
    .cards-grid { grid-template-columns: 1fr; }
    .login-box { width: 90%; padding: 36px 24px; }
    .card-actions { gap: 4px; }
    .btn { padding: 7px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>시나리오 피드백 관리</h1>
    <p>접근 권한이 필요합니다</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="header-inner">
      <span class="header-title">시나리오 피드백 관리</span>

      <div class="filter-group">
        <label>연도</label>
        <select class="filter-select" id="filter-year" onchange="applyFilters()">
          <option value="">전체</option>
          <option value="2026">2026</option>
        </select>
      </div>
      <div class="filter-group">
        <label>학교</label>
        <select class="filter-select" id="filter-school" onchange="applyFilters()">
          <option value="">전체</option>
          <option value="성심여자중학교">성심여자중학교</option>
          <option value="서울응암초등학교">서울응암초등학교</option>
          <option value="서울은평초등학교">서울은평초등학교</option>
        </select>
      </div>
      <div class="filter-group">
        <label>반</label>
        <select class="filter-select" id="filter-class" onchange="applyFilters()">
          <option value="">전체</option>
        </select>
      </div>

      <div class="status-filters">
        <button class="status-btn active" data-status-filter="all" onclick="setStatusFilter('all', this)">전체</button>
        <button class="status-btn" data-status-filter="pending" onclick="setStatusFilter('pending', this)">피드백대기</button>
        <button class="status-btn" data-status-filter="ready" onclick="setStatusFilter('ready', this)">피드백완료</button>
        <button class="status-btn" data-status-filter="sent" onclick="setStatusFilter('sent', this)">발송완료</button>
      </div>

      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stats-inner" id="stats-bar"></div>
  </div>

  <main class="main-content" id="main-content"></main>
</div>

    "senderName": "정보경",
    "senderEmail": "elliejung633812@gmail.com",

const HASH = 'e71b48da130200783dd6c03554a12b643afc937bd9db674324c000b189afc476';
const LS_AUTH = 'sf_auth_v1';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const h = await sha256(pw);
  if (h === HASH) {
    localStorage.setItem(LS_AUTH, '1');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  localStorage.removeItem(LS_AUTH);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

let activeStatusFilter = 'all';

function getStatus(id) {
  return localStorage.getItem(`status_v1_${id}`) || 'pending';
}
function setStatus(id, val) {
  localStorage.setItem(`status_v1_${id}`, val);
}
function getFeedback(id) {
  const stored = localStorage.getItem(`feedback_v1_${id}`);
  if (stored !== null) return stored;
  const item = SUBMISSIONS.find(s => s.id === id);
  return item ? item.aiFeedback : '';
}

// ═══════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════
function setStatusFilter(val, btn) {
  activeStatusFilter = val;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const year   = document.getElementById('filter-year').value;
  const school = document.getElementById('filter-school').value;
  const cls    = document.getElementById('filter-class').value;

  const filtered = SUBMISSIONS.filter(s => {
    if (year   && String(s.year)  !== year)   return false;
    if (school && s.school        !== school) return false;
    if (cls    && s.class         !== cls)    return false;
    if (activeStatusFilter !== 'all' && getStatus(s.id) !== activeStatusFilter) return false;
    return true;
  });

  renderCards(filtered);
  renderStats();
}

function populateClassFilter() {
  const sel = document.getElementById('filter-class');
  const classes = [...new Set(SUBMISSIONS.map(s => s.class))].sort();
  sel.innerHTML = '<option value="">전체</option>';
  classes.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function renderStats() {
  const counts = { pending: 0, ready: 0, sent: 0 };
  SUBMISSIONS.forEach(s => counts[getStatus(s.id)]++);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><span class="stat-dot pending"></span>피드백 대기 <span class="stat-count">${counts.pending}</span></div>
    <div class="stat-item"><span class="stat-dot ready"></span>피드백 완료 <span class="stat-count">${counts.ready}</span></div>
    <div class="stat-item"><span class="stat-dot sent"></span>발송 완료 <span class="stat-count">${counts.sent}</span></div>
    <div class="stat-item" style="margin-left:auto;color:var(--text-muted)">총 ${SUBMISSIONS.length}개 제출</div>
  `;
}

function schoolClass(school) {
  if (school === '성심여자중학교')  return 'school-sungsim';
  if (school === '서울응암초등학교') return 'school-eungam';
  if (school === '서울은평초등학교') return 'school-eunpyeong';
  return '';
}

function statusLabel(s) {
  if (s === 'pending') return '피드백 대기';
  if (s === 'ready')   return '피드백 완료';
  if (s === 'sent')    return '발송 완료';
  return s;
}

function renderCards(items) {
  const container = document.getElementById('main-content');

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-msg">해당 조건에 맞는 제출이 없습니다.</div>';
    return;
  }

  // group by school → class
  const bySchool = {};
  items.forEach(s => {
    if (!bySchool[s.school]) bySchool[s.school] = {};
    if (!bySchool[s.school][s.class]) bySchool[s.school][s.class] = [];
    bySchool[s.school][s.class].push(s);
  });

  let html = '';
  const schoolOrder = ['성심여자중학교','서울응암초등학교','서울은평초등학교'];

  schoolOrder.forEach(school => {
    if (!bySchool[school]) return;
    const sc = schoolClass(school);
    const total = Object.values(bySchool[school]).flat().length;
    html += `<div class="school-group ${sc}">
      <div class="school-header">
        <span class="school-badge">${school}</span>
        <span class="school-count">${total}개 제출</span>
      </div>`;

    Object.keys(bySchool[school]).forEach(cls => {
      html += `<div class="class-section">
        <div class="class-label">${cls}</div>
        <div class="cards-grid">`;
      bySchool[school][cls].forEach(s => {
        html += buildCard(s, sc);
      });
      html += `</div></div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;

  // restore textareas
  items.forEach(s => {
    const ta = document.getElementById(`ta_${s.id}`);
    if (ta) {
      ta.value = getFeedback(s.id);
      autoResize(ta);
    }
    updateCardStatus(s.id, getStatus(s.id));
  });
}

function buildCard(s, sc) {
  const status = getStatus(s.id);
  const escapedTitle = escHtml(s.scenarioTitle);
  return `
  <div class="card ${sc}" id="card_${s.id}" data-status="${status}">
    <div class="card-header">
      <div class="card-meta">
        <span>${escHtml(s.class)}</span>
        <span class="card-sep">|</span>
        <span class="group-tag">${escHtml(s.group)}</span>
      </div>
      <span class="status-badge ${status}" id="badge_${s.id}">${statusLabel(status)}</span>
    </div>
    <div class="card-body">
      <div class="sender-row">
        <span class="sender-name">${escHtml(s.senderName)}</span>
        <span class="sender-email">${escHtml(s.senderEmail)}</span>
        <span class="format-tag">${escHtml(s.fileFormat)}</span>
      </div>

      <div class="scenario-section">
        <button class="scenario-toggle" onclick="toggleScenario('${s.id}')">
          <span class="toggle-icon" id="icon_${s.id}">▶</span>
          <span class="scenario-title-text">${escapedTitle}</span>
        </button>
        <div class="scenario-content" id="sc_${s.id}">${escHtml(s.scenarioText)}</div>
      </div>

      <div>
        <div class="feedback-label">
          AI 피드백
          <span class="auto-saved" id="saved_${s.id}">저장됨</span>
        </div>
        <textarea
          class="feedback-textarea"
          id="ta_${s.id}"
          placeholder="피드백을 여기에 작성하세요..."
          oninput="onFeedbackInput('${s.id}', this)"
        ></textarea>
      </div>

      <div class="card-actions">
        <button class="btn btn-primary" id="btn_ready_${s.id}" onclick="advanceStatus('${s.id}', 'ready')">피드백 완료</button>
        <button class="btn btn-success" id="btn_sent_${s.id}" onclick="advanceStatus('${s.id}', 'sent')">발송 완료</button>
        <button class="btn btn-copy" id="btn_copy_${s.id}" onclick="copyMail('${s.id}', '${escAttr(s.senderEmail)}')">메일 복사</button>
      </div>
    </div>
  </div>`;
}

// INTERACTIONS
// ═══════════════════════════════════════
function toggleScenario(id) {
  const el   = document.getElementById(`sc_${id}`);
  const icon = document.getElementById(`icon_${id}`);
  const open = el.classList.toggle('open');
  icon.textContent = open ? '▼' : '▶';
  icon.classList.toggle('open', open);
}

let saveTimers = {};
function onFeedbackInput(id, el) {
  autoResize(el);
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => {
    localStorage.setItem(`feedback_v1_${id}`, el.value);
    const saved = document.getElementById(`saved_${id}`);
    if (saved) {
      saved.classList.add('visible');
      setTimeout(() => saved.classList.remove('visible'), 1800);
    }
  }, 600);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(120, el.scrollHeight) + 'px';
}

function advanceStatus(id, target) {
  const current = getStatus(id);
  // toggle: if already at target, go back
  let next;
  if (current === target) {
    next = target === 'ready' ? 'pending' : 'ready';
  } else {
    next = target;
  }
  setStatus(id, next);
  updateCardStatus(id, next);
  renderStats();
  if (activeStatusFilter !== 'all') applyFilters();
}

function updateCardStatus(id, status) {
  const card  = document.getElementById(`card_${id}`);
  const badge = document.getElementById(`badge_${id}`);
  const btnR  = document.getElementById(`btn_ready_${id}`);
  const btnS  = document.getElementById(`btn_sent_${id}`);
  if (!card) return;

  card.dataset.status = status;
  badge.className = `status-badge ${status}`;
  badge.textContent = statusLabel(status);

  if (status === 'pending') {
    btnR.textContent = '피드백 완료';
    btnR.className = 'btn btn-primary';
    btnS.textContent = '발송 완료';
    btnS.className = 'btn btn-success';
  } else if (status === 'ready') {
    btnR.textContent = '피드백 완료 ✓';
    btnR.className = 'btn btn-primary';
    btnS.textContent = '발송 완료';
    btnS.className = 'btn btn-success';
  } else if (status === 'sent') {
    btnR.textContent = '피드백 완료 ✓';
    btnR.className = 'btn btn-primary';
    btnS.textContent = '발송 완료 ✓';
    btnS.className = 'btn btn-success';
  }
}

async function copyMail(id, email) {
  const ta = document.getElementById(`ta_${id}`);
  const fbText = ta ? ta.value : getFeedback(id);
  const text = `받는 사람: ${email}\n\n${fbText}`;
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const el = document.createElement('textarea');
    el.value = text;
    Object.assign(el.style, { position:'fixed', opacity:'0', top:'0', left:'0' });
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }
  const btn = document.getElementById(`btn_copy_${id}`);
  if (btn) {
    btn.textContent = '복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '메일 복사'; btn.classList.remove('copied'); }, 2000);
  }
}

// ═══════════════════════════════════════
// ESCAPE HELPERS
// ═══════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function escAttr(str) {
  return String(str).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  populateClassFilter();
  renderStats();
  applyFilters();
}

// check session on load
if (localStorage.getItem(LS_AUTH) === '1') {
  showApp();
}
</script>
